services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: it_yaqinlar
      POSTGRES_USER: ityaqinlar
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ityaqinlar -d it_yaqinlar"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    restart: always
    environment:
      DATABASE_URL: postgresql://ityaqinlar:${DB_PASSWORD}@db:5432/it_yaqinlar
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_SECRET: ${ADMIN_SECRET}
      PORT: 5000
      CLIENT_URL: ${CLIENT_URL}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./client
    restart: always
    ports:
      - "9000:80"
    depends_on:
      - server

volumes:
  postgres_data:
  uploads:
